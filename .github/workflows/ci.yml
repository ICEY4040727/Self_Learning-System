name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-issue-closure:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce auto-close issue keyword
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const autoCloseRef = /\b(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+\b/i;
            if (!autoCloseRef.test(body)) {
              core.setFailed(
                "PR description must include an auto-closing issue reference such as `Closes #130` / `Fixes #130` / `Resolves #130`. `Related to #130` alone will not close the issue."
              );
            }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: backend
          args: check --config backend/pyproject.toml --ignore F401 --ignore I001 --ignore E402 --ignore B904 --ignore F821

  backend-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: |
          cd backend
          uv pip install -r requirements-dev.txt --system
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=.. pytest tests/ -v --ignore=tests/test_archive.py --ignore=tests/test_checkpoints.py --ignore=tests/test_phase4_e2e.py --ignore=tests/test_prompt_builder.py
        env:
          DATABASE_URL: "sqlite://"
          SECRET_KEY: "test-secret-key-for-ci"
          TESTING: "1"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify lock file in sync
        run: |
          cd frontend
          npm install --package-lock-only
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync with package.json. Run 'cd frontend && npm install' and commit the updated lock file."
            exit 1
          }
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  phase4-ui-e2e:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Start frontend
        run: |
          cd frontend
          node ./node_modules/vite/bin/vite.js --host 127.0.0.1 --port 5173 > ../frontend-e2e.log 2>&1 &
          echo $! > ../frontend-e2e.pid
          cd ..
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then break; fi
            sleep 2
          done
      - name: Run phase4 UI E2E
        run: |
          cd frontend
          npx playwright test e2e/phase4-ui.spec.mjs --workers=1 --reporter=line
      - name: Upload phase4 UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-ui-e2e-artifacts
          path: |
            docs/evidence/issue-127/03-knowledge-graph-node-click.png
            docs/evidence/issue-127/04-learning-mobile-layout.png
            frontend-e2e.log
          if-no-files-found: warn
      - name: Stop frontend
        if: always()
        run: |
          if [ -f frontend-e2e.pid ]; then kill "$(cat frontend-e2e.pid)" || true; fi

  docker-compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-smoke-secret-key-127/' .env
          sed -i 's/^CORS_ORIGIN=.*/CORS_ORIGIN=http:\/\/localhost/' .env
      - name: Build and start compose stack
        run: docker compose up -d --build
      - name: Verify compose runtime
        run: |
          docker compose ps > docker-compose-ps.txt
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:8000/health > docker-health.json; then break; fi
            sleep 3
          done
          cat docker-health.json
          docker compose logs backend --tail=120 > docker-backend.log
          docker compose logs frontend --tail=120 > docker-frontend.log
      - name: Upload docker smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-smoke-artifacts
          path: |
            docker-compose-ps.txt
            docker-health.json
            docker-backend.log
            docker-frontend.log
          if-no-files-found: warn
      - name: Teardown compose stack
        if: always()
        run: docker compose down -v
