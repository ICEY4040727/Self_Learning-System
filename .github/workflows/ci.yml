name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: backend
          args: check --config backend/pyproject.toml

  backend-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: |
          cd backend
          uv pip install -r requirements-dev.txt --system
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=.. pytest tests/ -v
        env:
          DATABASE_URL: "sqlite://"
          SECRET_KEY: "test-secret-key-for-ci"
          TESTING: "1"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify lock file in sync
        run: |
          cd frontend
          npm install --package-lock-only
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync with package.json. Run 'cd frontend && npm install' and commit the updated lock file."
            exit 1
          }
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build
