[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008", "E711", "E712"]

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["F401", "I001"]
"alembic/**/*" = ["F401", "I001"]
"services/llm/adapter.py" = ["F821", "E402", "B904"]
"services/llm/resilience.py" = ["F821", "E402", "B904"]
"services/llm/sdk_adapter.py" = ["F821", "E402", "B904"]
"services/llm/types.py" = ["F821"]
